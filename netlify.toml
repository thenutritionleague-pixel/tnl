[build]
  base    = "mobile"
  command = "git clone https://github.com/flutter/flutter.git --depth 1 -b stable flutter && flutter/bin/flutter build web --release --base-href /"
  publish = "build/web"   # relative to base ("mobile/"), not repo root


[build.environment]
  FLUTTER_WEB_USE_SKIA = "true"

# Flutter web uses client-side routing — send all paths to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
